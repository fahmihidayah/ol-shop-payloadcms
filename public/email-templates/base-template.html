<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{SUBJECT}}</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f5f5;
            line-height: 1.6;
        }
        .email-container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
        }
        .header {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #ffffff;
            padding: 40px 30px;
            text-align: center;
        }
        .header h1 {
            margin: 0;
            font-size: 28px;
            font-weight: 600;
            letter-spacing: -0.5px;
        }
        .header p {
            margin: 10px 0 0 0;
            font-size: 16px;
            opacity: 0.9;
        }
        .body-content {
            padding: 40px 30px;
            background-color: #ffffff;
            color: #1f2937;
        }
        .body-content h2 {
            color: #1f2937;
            font-size: 22px;
            margin-top: 0;
            margin-bottom: 20px;
            font-weight: 600;
        }
        .body-content p {
            margin: 0 0 16px 0;
            font-size: 15px;
            color: #4b5563;
        }
        .body-content a {
            color: #2563eb;
            text-decoration: none;
        }
        .body-content a:hover {
            text-decoration: underline;
        }
        .button {
            display: inline-block;
            padding: 14px 32px;
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            color: #ffffff !important;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 600;
            font-size: 15px;
            margin: 20px 0;
            transition: transform 0.2s;
        }
        .button:hover {
            transform: translateY(-1px);
            text-decoration: none;
        }
        .divider {
            height: 1px;
            background-color: #e5e7eb;
            margin: 30px 0;
        }
        .footer {
            background-color: #f9fafb;
            padding: 30px;
            text-align: center;
            border-top: 1px solid #e5e7eb;
        }
        .footer p {
            margin: 0 0 10px 0;
            font-size: 13px;
            color: #6b7280;
            line-height: 1.5;
        }
        .footer .company-name {
            font-weight: 600;
            color: #2563eb;
            font-size: 14px;
        }
        .footer .social-links {
            margin: 20px 0 10px 0;
        }
        .footer .social-links a {
            display: inline-block;
            margin: 0 8px;
            color: #6b7280;
            text-decoration: none;
            font-size: 13px;
        }
        .footer .unsubscribe {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e5e7eb;
        }
        .footer .unsubscribe a {
            color: #6b7280;
            text-decoration: underline;
            font-size: 12px;
        }
        @media only screen and (max-width: 600px) {
            .header {
                padding: 30px 20px;
            }
            .header h1 {
                font-size: 24px;
            }
            .body-content {
                padding: 30px 20px;
            }
            .footer {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="email-container">
        <!-- Header -->
        <div class="header">
            <h1>{{HEADER_TITLE}}</h1>
            {{HEADER_SUBTITLE}}
        </div>

        <!-- Body Content -->
        <div class="body-content">
            {{BODY_CONTENT}}
        </div>

        <!-- Footer -->
        <div class="footer">
            <p class="company-name">{{COMPANY_NAME}}</p>
            <p>{{COMPANY_ADDRESS}}</p>
            <p>{{COMPANY_CONTACT}}</p>

            <div class="social-links">
                {{SOCIAL_LINKS}}
            </div>

            <p style="margin-top: 20px; font-size: 12px; color: #9ca3af;">
                You received this email because you are a customer of {{COMPANY_NAME}}.
            </p>

            <div class="unsubscribe">
                <a href="{{UNSUBSCRIBE_LINK}}">Unsubscribe from marketing emails</a>
            </div>
        </div>
    </div>
</body>
</html>
